<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Google Chrome Template</title>
	<link rel="stylesheet" href="styles.css">
	<!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"> -->
	<script>
		function handleSearch(event) {
			event.preventDefault();
			const query = document.querySelector('.search-input').value;
			if (query) {
				window.location.href = `result.html?query=${encodeURIComponent(query)}`;
			}
		}

		document.addEventListener("DOMContentLoaded", function () {
			document.querySelector('.gsb').addEventListener('click', function (event) {
				handleSearch(event);
			});
		});
	</script>
</head>

<body>

	<!-- Navigation Section -->
	<nav class="site-navigation">
		<div class="header-container">
			<a href="#" class="nav-link">Gmail</a>
			<a href="#" class="nav-link">Images</a>
			<a href="#"><i class="fa fa-solid fa-flask myflask"></i></a>
			<button class="sign-in-btn">Sign in</button>
		</div>
	</nav>

	<!-- Main Content Section -->
	<main>
		<img id="google_image" src="assets/Praneeth-6-11-2024.png" alt="Google Logo">

		<!-- Search Input Section -->
		<section class="search-input-section">
			<form class="search-input-container" onsubmit="handleSearch(event)">
				<img src="assets/search_icon.png" alt="google-search-btn" class="gsb" style="cursor: pointer;">
				<input type="text" value="All about Praneeth Reddy.." style="opacity: 0.7;" class="search-input">
				<button type="submit" style="display: none;">Submit</button>
			</form>
			<img src="assets/voice-removebg-preview.png" alt="Google Mic" class="mic-icon">
		</section>

		<!-- Buttons Section -->
		<section class="buttons-section" style="opacity: 0.6;">
			<button class="google-search-btn" onclick="handleSearch(event)">Google Search</button>
			<button class="feeling-lucky-btn">I'm Feeling Lucky</button>
		</section>

		<div class="customize_size">
			<i class="fa fa-solid fa-pen"></i>
			Customize Chrome
		</div>
	</main>
</body>

</html>
